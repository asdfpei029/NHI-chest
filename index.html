{"code":"57032B","pts":3712,"start":"20240401","en":"NAVA ventilation and Edi monitoring / day","zh":"神經調控通氣輔助呼吸治療及橫膈膜電位訊號監測（NAVA，一天）","note":"1.適應症：限用於患有支氣管肺發育不全的未滿兩歲嬰幼兒，且符合插管天數十四天以上，無法拔管之病人。2.支付規範： (1)限醫院緊急醫療能力分級評定基準評定結果，屬高危險妊娠及新生兒醫療中度級以上急救責任醫院申報。(2)限新生兒科、兒童胸腔暨重症科、兒童重症醫學科、兒童神經科專科醫師申報。(3)申報費用時應檢附下列呼吸治療項目之紀錄：呼吸器使用模式、Edi min、Edi peak、FiO2、PEEP，視需要加填NAVA level。(4)限住院案件申報。(5)不得同時申報57001B、57023B、57029C、57030B及57031B。","cat":"呼吸治療/呼吸器"},
{"code":"57030B","pts":6000,"start":"20240401","en":"Humidified high flow oxygen therapy - First day (incl. tubing)","zh":"濕化高流量氧氣治療（HFNC）— 第一天照護費（含管路特材）","note":"1.限急診或住院病人符合下列適應症者使用：(1)成人(十九歲以上)A.急性缺氧性呼吸衰竭，且需同時符合下列各項條件：(a)當以10L/min或更高的流速供應氧氣至少十五分鐘，P/F ratio≦300時。(b)RR>25次/min，呼吸困難或呼吸窘迫。(c)PaCO₂≦45 mmHg。B.呼吸衰竭拔管後，預防再次插管使用，並有下列任一情形：(a)曾插管二十四小時以上之病人，且有下列任一高危險因子者：年紀六十五歲以上、APACHE II＞12分、BMI>30 Kg/㎡、呼吸道清除功能失效、困難脫離呼吸器病人或插管大於七天病人。(b)經臨床負責醫師判定有再度發生呼吸衰竭之可能。(2)兒童(未滿十九歲)A.缺氧性呼吸衰竭或呼吸窘迫，並有下列任一情形者：(a)血氧飽和濃度SpO₂≦94%。(b)呼吸窘迫症狀（呼吸急促、使用呼吸輔助肌、鼻翼扇動、點頭式呼吸、胸凹或矛盾式呼吸等）。B.脫離侵襲性或非侵襲性呼吸器後，預防再次使用呼吸器時使用。2.限內科、外科、麻醉科、兒科、急診醫學科、神經科及神經外科專科醫師執行。3.不得同時申報57004C、57023B及57032B。4.更換管路當日比照第一天照護費申報。5.兒童(未滿十九歲)得依表定點數加計百分之二十。6.若臨床上認為拔管後應使用非侵襲性陽壓呼吸治療的成人病人，則不建議使用本項。7.57030B內含一般材料費、高流量鼻導管及高流量管路組費比率為百分之六十五。","cat":"HFNC 高流量"},

{"code":"02011K","pts":1925,"start":"20260401","en":"","zh":"加護病床住院診察費（天）— 醫學中心","note":"1.精神科加護病床、燒傷中心及骨髓移植隔離病床比照申報。2.兒科專科醫師得加計百分之一百二十，若同時符合兒童加成或兒科及新生兒科加護病房加成者，依加成率合計後一併加成，最高加成上限為百分之一百六十。小兒外科專科醫師診治未滿十九歲病人之案件，得依前述規範加成。","cat":"重症/ICU"},

{"code":"03010E","pts":2852,"start":"20240701","en":"ICU bed/day - room fee (medical center)","zh":"加護病床（床/天）— 病房費（醫學中心）","note":"註：1.監視器、C.V.P.處理費等已包括在所訂點數內，不得另計。2.呼吸器、電擊、氧氣、C.V.P.置入及顱內壓監視置入等另按實際使用申報。3.使用加護病床病人以下列為限：1)急性心肌梗塞病人，不穩定型心絞痛或狹心症病人。2)急性心臟衰竭、急性腎臟衰竭、急性肝臟衰竭病人。3)急性呼吸衰竭、呼吸窘迫、間歇性呼吸暫停或重度窒息需積極呼吸治療病人。4)手術後仍需輔助性治療或生命徵象不穩定者。5)危命性不整脈（含心搏暫停後）病人。6)休克病人。7)嚴重新陳代謝及電解質、水分不平衡病人或內分泌異常需加強監視病人。8)急性中毒性昏迷病人。9)肝硬化性肝昏迷病人。10)胸腔外科、心臟外科及神經外科術後病人需加強醫療者。11)腦中風、腦膜炎、腦炎等腦病變急性期，合併意識障礙或昏迷者。12)癲癇重積症病人。13)急性顱內壓增高危及生命者。14)急性腦幹病變者。15)敗血症或疑敗血症且生命徵象不穩定者。16)新生兒黃膽過高需換血者。17)出生體重低於一千五百公克之極度早產兒。18)兒童進行高風險侵入性處置或手術，需加強監測或醫療者。19)其他危篤重症危及生命者。4.入住加護病房之病人如符合下列條件，應予轉出：1)血液動力學值穩定者(生命徵象、中心靜脈壓、肺動脈楔壓、心輸出量)。2)脫離呼吸器。3)病情穩定已不需使用特殊生理監測器者。4)合併症已穩定控制者。5)已脫離急性期不需加護醫療照護者。6)家屬要求自動出院者。","cat":"重症/ICU"},

{"code":"05151B","pts":360,"start":"20191001","en":"","zh":"加護病房營養照護費—初次照護費","note":"1.適應症：(1)一歲以上且入住ICU超過二天之個案。(2)未滿一歲且入住ICU超過二天之個案，須由醫師會診。2.申報次數：每案入住ICU最多申報六次，同日內限申報一次。(1)七天內：限申報05151B一次、05152B最多二次。(2)超過七天部分：限申報05152B最多三次。(3)不得同時申報編號05151B、05152B。(4)同院不同ICU病房之入住天數須合併計算。3.執行人員資格：經中華民國營養師公會全國聯合會認證之營養師，並應報經保險人核定，如有異動，仍應重行報請核定。4.申報時應有營養照護紀錄於病歷備查，內容須涵蓋：(1)營養評估。(2)營養診斷及處置。(3)營養評值及追蹤。","cat":"重症/ICU"},

{"code":"P1005K","pts":10647,"start":"20210701","en":"","zh":"醫學中心亞急性呼吸照護病床論日計酬：第1–21天（≦42日）","note":"一、患者符合以下狀況，得回轉加護病房照護，每次以7日為原則：1.各器官系統呈現不穩定狀況：●血壓須升壓藥維持，心律不整狀態。●腎衰竭表現者，或接受血液透析情況不穩定者。●肝衰竭表現者。●大量胃腸出血者(指仍觀察是否須外科治療者)。●嚴重感染仍尚未控制穩定者。2.外科術後，2週內須再為相同原因手術者，或手術後巨大開放性傷口仍未穩定。3.氧氣狀況不穩定者：氧氣濃度(FIO2)≧40%且吐氣末端陽壓 PEEP≧10cmH2O 仍無法維持aO2(SpO2)≧90%或 PaO2≧60mmHg. 二、符合以上狀況回轉加護病房照護者，病情好轉，應依患者病情下轉適當之照護階段，下轉亞急性呼吸照護病床者，累計回轉前亞急性呼吸照護病床之照護日數。三、病況若不適合積極嘗試脫離呼吸器 者，不應轉入亞急性呼吸照護病床。四、專業認定未積極嘗試脫離且無其他 醫學上特殊理由之亞急性呼吸照護病床病患，以下一階段慢性呼吸照護病房費用給付。五、本階段病患若有醫學上理由認定無 須嘗試脫離呼吸器時，改以慢性呼吸照護病房費用支付。","cat":"呼吸照護病房"},

{"code":"47094B","pts":9521,"start":"20230701","en":"Therapeutic hypothermia after cardiac arrest — Day 1 (≦24h)","zh":"心跳停止之低溫療法（TTM）— 第一日（≦24小時）","note":"註：1.適應症：心跳停止病人，進行復甦急救後意識仍不清者(GCS<8)或無遵循口頭醫囑（motor<6）。2.排除條件：(1)恢復自發性循環大於十二小時。(2)腦出血。(3)收縮血壓<90mmHg。(4)大量活動性出血。(5)無法終止的致命性心律不整。(6)在心跳停止前即有失智或長期意識障礙。(7)末期疾病。3.支付規範：(1)總治療療程為三天。(2)不得同時申報：47037B、47038B、47049B、47081B、47082B。(3)特殊材料費另計。","cat":"低溫治療/TTM"},

{"code":"47081B","pts":6057,"start":"20231001","en":"Therapeutic hypothermia for refractory intracranial hypertension — Day 1","zh":"難治型顱內高壓之低溫療法— 首日","note":"1.適應症：因下列原因造成之顱內高壓，以傳統治療方式如頭部抬高三十度、降腦壓藥物、開顱手術、深度鎮靜且ICP仍處於20mmHg大於十分鐘者，皆無法使顱內壓降低：(1)出血性中風。(2)次重度或重度腦創傷GCS≦12。2.禁忌症：(1)任意原因引起之休克。(2)在意外前即有失智或長期意識障礙。(3)腦死。(4)自發性低體溫＜32℃者。(5)顱內有占據顱內空間病灶如血塊、腦水腫、水腦症等，符合手術適應症，但未進行手術者。(6)嚴重感染者。(7)呼吸窘迫症候群。3.支付規範：(1)限ICU執行。(2)同次住院，限申報「首日」一次，「第二日至第七日(每日)」至多六次。(3)申報時需檢附生命徵象及藥物使用紀錄。(4)不得同時申報：47037B、47038B、47039C、47094B-47096B及47097B-47100B。4.限神經科、神經外科及兒科專科醫師執行。","cat":"低溫治療/TTM"},

{"code":"47104B","pts":5114,"start":"20220301","en":"Prone positioning ventilation (each procedure: supine→prone→supine)","zh":"俯臥通氣治療 — 每療程（仰臥→俯臥→仰臥）","note":"1.每療程係指仰臥→俯臥→仰臥。2.適應症：(1)成人（十九歲以上）：入住加護病房且插管使用呼吸器之急性呼吸窘迫症候群病人（J80），同時符合下列各項條件：a.氧合指數（PaO₂/FiO₂ ratio）≦150。b.七日內急性發作。c.沒有心因性肺水腫的證據。d.CXR 顯示兩側肺野浸潤。(2)兒童（未滿十九歲）：入住加護病房且插管使用呼吸器，同時符合下列情形之一者：a.氧合指數（PaO₂/FiO₂ ratio）≦150。b.OI>16。c.OSI>12.3。3.禁忌症：心胸及腹腔主要手術、脊椎與骨盆不穩定、懷孕第二及第三期、頭部外傷、腦壓或眼壓過高之病人、正在發作之癲癇患者。4.限內科、外科、麻醉科、兒科、急診醫學科、神經科、神經外科專科醫師執行。5.不得同時申報47045C。備註：OI=(FiO₂×mean airway pressure×100)/PaO₂OSI=(FiO₂×mean airway pressure×100)/SpO₂","cat":"俯臥通氣"},

{"code":"30101B","pts":8252,"start":"20241201","en":"EGFR mutation in vitro diagnostics testing (IVD)","zh":"肺癌 EGFR 突變體外診斷醫療器材檢測（IVD）","note":"1.適應症：(1)限復發或轉移性(第Ⅳ期)之非小細胞且非鱗狀上皮肺癌，於使用EGFR標靶藥物前得申請檢測。(2)第ⅢB期及第ⅢC期，經肺癌多專科團隊討論，無法以外科手術完全切除、且不適合放射化學治療，於使用EGFR標靶藥物前得申請檢測。2.支付規範：(1)本檢測應包含EGFR(外顯子[exon]18、19、20、21)之突變分析。(2)限使用已確診之腫瘤病理組織或細胞檢體做檢測，並於檢測報告上註明診斷與腫瘤細胞百分比。(3)限具肺癌EGFR基因檢測項目通過CAP、TAF或ILAC相互承認協議組織認證之實驗室操作。(4)每人終生限給付一次。(5)申報本項尚須上傳檢測試劑代碼，未上傳者不予支付。","cat":"肺癌基因檢測"},
{"code":"30102B","pts":6755,"start":"20241201","en":"EGFR mutation Laboratory Developed Test (LDTs)","zh":"肺癌 EGFR 突變實驗室開發檢測（LDTs）","note":"1.適應症：同30101B（第Ⅳ期或第ⅢB/ⅢC期NSCLC非鱗狀上皮，使用EGFR標靶藥物前）。2.支付規範：(1)本檢測應包含EGFR(exon 18、19、20、21)之突變分析。(2)限使用已確診之腫瘤病理組織或細胞檢體。(3)限主管機關核定之實驗室開發檢測施行計畫表列醫療機構申報。(4)執行機構應報經保險人核定。(5)每人終生限給付一次。","cat":"肺癌基因檢測"},
{"code":"30103B","pts":5984,"start":"20200401","en":"PD-L1 immunohistochemistry (IHC)","zh":"PD-L1 免疫組織化學染色（IHC）","note":"1.適應症：符合健保藥物給付規定第9節抗癌瘤藥物9.69.免疫檢查點PD-1/PD-L1抑制劑之使用條件，且申請時需檢附PD-L1表現量檢測報告之疾病。2.支付規範：(1)限使用食品藥物管理署核准之第三等級醫療器材檢測試劑(IVD)操作，並於報告上註明方法學與檢測平台。(2)應檢附解剖病理或口腔病理專科醫師簽名與加註專科醫師證書字號之病理報告。(3)限符合適應症規範者用藥前之伴隨式檢測，每人終生限給付一次。(4)申報本項尚須上傳檢測試劑代碼，未上傳者不予支付。","cat":"肺癌基因檢測"},
{"code":"30105B","pts":7294,"start":"20220201","en":"ALK in vitro diagnostics testing - IHC method","zh":"ALK（間變性淋巴瘤激酶）突變體外診斷醫療器材檢測（IVD-IHC法）","note":"1.適應症：(1)限復發或轉移性(第Ⅳ期)之非小細胞且非鱗狀上皮肺癌，於EGFR基因檢測為陰性時，得申請檢測。(2)第ⅢB期及第ⅢC期，經肺癌多專科團隊討論，無法以外科手術完全切除、且不適合放射化學治療，於EGFR基因檢測為陰性時，得申請檢測。2.支付規範：(1)限使用食品藥物管理署核准之第三等級醫療器材檢測試劑操作，並於報告上註明方法學與檢測平台。(2)限解剖病理專科醫師簽發報告，並加註專科醫師證書字號。(3)限符合適應症規範者用藥前之伴隨式檢測，每人終生限給付一次。","cat":"肺癌基因檢測"},
{"code":"30107B","pts":3006,"start":"20241201","en":"BRAF mutation testing (LDTs)","zh":"BRAF 基因突變分析實驗室開發檢測（LDTs）","note":"適應症須符合下列任一條件：(1)黑色素瘤使用Vemurafenib、Dabrafenib/Trametinib者。(2)轉移性直腸結腸癌使用Cetuximab/Panitumumab，且KRAS及NRAS為wild type者。(3)甲狀腺癌（不包含髓質癌）：乳突性及濾泡性甲狀腺癌經碘131及抑制血管新生標靶藥物治療無效者；無分化甲狀腺癌經多專科團隊評估者。(4)非小細胞肺癌使用Dabrafenib/Trametinib者。限主管機關核定之LDTs計畫表列醫療機構申報，每人終生限給付一次。","cat":"肺癌基因檢測"},
{"code":"30301B","pts":10000,"start":"20241201","en":"Solid tumor NGS - BRCA1/2 testing (germline or somatic)","zh":"實體腫瘤次世代基因定序（NGS）— BRCA1/2 基因檢測","note":"1.適應症：如附表2.2.1（包含乳癌、卵巢癌、胰臟癌、攝護腺癌等BRCA適應症）。2.支付規範：(1)限區域級以上醫院或通過癌症診療品質認證醫院。(2)須院內設立或跨院聯合組成分子腫瘤委員會(MTB)。(3)限主管機關核定之LDTs計畫表列醫療機構（檢測項目類別為「抗癌瘤藥物之伴隨檢測」或「癌症篩檢、診斷、治療及預後之基因檢測」）。(4)Germline BRCA1/2基因檢測可使用血液檢體，其他須使用已確診之腫瘤病理組織。","cat":"肺癌基因檢測"},

// State
let cat='all', q='', sort='def';

function fmtDate(d){
  if(!d||d.startsWith('2910'))return '現行有效';
  return d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8);
}
function catCC(id){ const c=CATS.find(x=>x.id===id); return c?c.cc:''; }

function filtered(){
  let d = cat==='all' ? DB : DB.filter(x=>x.cat===cat);
  if(q){ const lq=q.toLowerCase(); d=DB.filter(x=>x.code.toLowerCase().includes(lq)||x.zh.toLowerCase().includes(lq)||x.en.toLowerCase().includes(lq)||x.note.toLowerCase().includes(lq)); }
  if(sort==='hi') d=[...d].sort((a,b)=>b.pts-a.pts);
  else if(sort==='lo') d=[...d].sort((a,b)=>a.pts-b.pts);
  return d;
}

function hl(text){
  if(!q||!text) return text;
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(e,'gi'),m=>`<mark>${m}</mark>`);
}

function buildSide(){
  const el=document.getElementById('side');
  el.innerHTML='';
  CATS.forEach((c,i)=>{
    if(i===1){
      const d=document.createElement('div'); d.className='side-div'; el.appendChild(d);
      const l=document.createElement('div'); l.className='side-lbl'; l.textContent='分類'; el.appendChild(l);
    }
    const cnt = c.id==='all' ? DB.length : DB.filter(x=>x.cat===c.id).length;
    const div=document.createElement('div');
    div.className='sitem'+(cat===c.id?' active':'');
    div.innerHTML=`<span class="ico">${c.ico}</span><span>${c.label}</span><span class="cnt">${cnt}</span>`;
    div.onclick=()=>{ cat=c.id; q=''; document.getElementById('si').value=''; render(); };
    el.appendChild(div);
  });
}

function buildCards(){
  const data=filtered();
  const grid=document.getElementById('grid');
  const ctitle=document.getElementById('ctitle');
  const cbadge=document.getElementById('cbadge');
  const scnt=document.getElementById('scnt');
  const catObj=CATS.find(c=>c.id===cat)||CATS[0];
  ctitle.textContent=(q?'🔍 搜尋結果':`${catObj.ico} ${catObj.label}`);
  cbadge.textContent=`${data.length} 項`;
  scnt.textContent=q?`找到 ${data.length} 筆`:'';
  grid.innerHTML='';
  if(!data.length){
    grid.innerHTML=`<div class="empty"><div class="ei">🔍</div><p>沒有符合「${q}」的項目</p></div>`;
    return;
  }
  data.forEach(item=>{
    const cc=catCC(item.cat);
    const div=document.createElement('div');
    div.className=`card cc-${cc}`;
    const hasNote=item.note&&item.note.trim();
    div.innerHTML=`
      <div class="chead">
        <span class="ccode">${hl(item.code)}</span>
        <div class="cmain">
          <div class="czh">${hl(item.zh)}</div>
          ${item.en?`<div class="cen">${hl(item.en)}</div>`:''}
          <div class="cmeta">
            <span class="pts">${item.pts.toLocaleString()} 點</span>
            <span class="dtbadge">生效 ${fmtDate(item.start)}</span>
            ${hasNote?`<span class="expi">▼</span>`:''}
          </div>
        </div>
        <button class="cpbtn" data-code="${item.code}">複製代碼</button>
      </div>
      ${hasNote?`<div class="cnote">${hl(item.note)}</div>`:''}
    `;
    if(hasNote){
      div.querySelector('.chead').addEventListener('click',e=>{
        if(e.target.classList.contains('cpbtn')) return;
        div.classList.toggle('open');
      });
    }
    const btn=div.querySelector('.cpbtn');
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      navigator.clipboard.writeText(item.code).catch(()=>{});
      btn.textContent='✓ 已複製'; btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='複製代碼';btn.classList.remove('copied');},1500);
    });
    grid.appendChild(div);
  });
}

function render(){ buildSide(); buildCards(); }

// Sort buttons
function setSortBtns(){
  ['s0','s1','s2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(sort==='def'?'s0':sort==='hi'?'s1':'s2').classList.add('on');
}
document.getElementById('s0').onclick=()=>{sort='def';setSortBtns();render();};
document.getElementById('s1').onclick=()=>{sort='hi';setSortBtns();render();};
document.getElementById('s2').onclick=()=>{sort='lo';setSortBtns();render();};

// Search
document.getElementById('si').addEventListener('input',e=>{
  q=e.target.value.trim();
  if(q) cat='all';
  render();
});
document.getElementById('scl').onclick=()=>{q='';document.getElementById('si').value='';render();};

// Init
render();
</script>
