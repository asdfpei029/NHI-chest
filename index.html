<style>

  --yellow: #d97706;

  --red: #dc2626;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --teal: #0891b2;

  --orange-light: #ffedd5;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.app-header {
  background: var(--blue);
  color: #fff;
  padding: 12px 20px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(37,99,235,.25);
}
.app-header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.app-header .version { font-family: 'IBM Plex Mono', monospace; font-size: 11px; opacity: .75; background: rgba(255,255,255,.15); padding: 2px 8px; border-radius: 4px; }

/* Search bar */
.search-bar-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 8px; align-items: center;
}
.search-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 14px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--blue); }
.search-clear { background: none; border: none; cursor: pointer; color: var(--sub); font-size: 18px; padding: 4px 8px; border-radius: 6px; }
.search-clear:hover { background: var(--bg2); }
.search-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--sub); white-space: nowrap; }

/* Layout */
.main-layout { display: flex; min-height: calc(100vh - 100px); }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  position: sticky; top: 100px;
  height: calc(100vh - 100px);
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-section { padding: 10px 0 4px; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--sub); letter-spacing: .08em; padding: 0 14px 4px; text-transform: uppercase; }
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer;
  font-size: 13px; color: var(--text);
  border-left: 3px solid transparent;
  transition: all .15s; user-select: none;
}
.sidebar-item:hover { background: var(--bg2); }
.sidebar-item.active { background: var(--blue-light); border-left-color: var(--blue); color: var(--blue); font-weight: 700; }
.sidebar-item .cat-icon { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
.sidebar-item .cat-count { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--sub); background: var(--bg2); padding: 1px 5px; border-radius: 4px; }
.sidebar-item.active .cat-count { background: rgba(37,99,235,.12); color: var(--blue); }
.sidebar-divider { height: 1px; background: var(--border); margin: 6px 14px; }

/* Content */
.content { flex: 1; padding: 16px; overflow: auto; }
.content-title {
  font-size: 17px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.content-title .cat-badge {
  font-size: 12px; font-weight: 500; padding: 2px 10px;
  border-radius: 20px; background: var(--blue-light); color: var(--blue);
  font-family: 'IBM Plex Mono', monospace;
}

/* Cards */
.cards-grid { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.card-header {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px 10px;
  cursor: pointer;
}
.card-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: var(--blue);
  background: var(--blue-light);
  padding: 3px 8px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0;
  letter-spacing: .03em;
}
.card-main { flex: 1; min-width: 0; }
.card-name-zh { font-size: 14px; font-weight: 600; line-height: 1.4; }
.card-name-en { font-size: 11px; color: var(--sub); margin-top: 2px; font-style: italic; }
.card-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.points-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--green);
  background: var(--green-light);
  padding: 2px 10px; border-radius: 6px;
}
.date-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--sub);
  background: var(--bg2); padding: 2px 7px; border-radius: 4px;
}
.copy-btn {
  margin-left: auto; flex-shrink: 0;
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  font-size: 11px; cursor: pointer; color: var(--sub);
  font-family: 'IBM Plex Mono', monospace;
  transition: all .15s;
}
.copy-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
.copy-btn.copied { background: var(--green-light); color: var(--green); border-color: var(--green); }
.expand-icon { margin-left: 8px; color: var(--sub); font-size: 12px; flex-shrink: 0; transition: transform .2s; }
.card.expanded .expand-icon { transform: rotate(180deg); }

.card-note {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 12.5px;
  line-height: 1.7;
  color: #3a4a6a;
  display: none;
  white-space: pre-wrap;
  word-break: break-all;
}
.card.expanded .card-note { display: block; }
.no-note { font-style: italic; color: var(--sub); }

/* Category colors */
.cat-肺功能檢查 .card-code { background: var(--teal-light); color: var(--teal); }
.cat-呼吸治療呼吸器 .card-code { background: var(--blue-light); color: var(--blue); }
.cat-HFNC高流量 .card-code { background: var(--purple-light); color: var(--purple); }
.cat-重症ICU .card-code { background: var(--red-light); color: var(--red); }
.cat-呼吸照護病房 .card-code { background: var(--orange-light); color: var(--orange); }
.cat-支氣管鏡EBUS .card-code { background: var(--yellow-light); color: var(--yellow); }
.cat-侵入性處置 .card-code { background: var(--pink-light); color: var(--pink); }
.cat-低溫治療TTM .card-code { background: var(--purple-light); color: var(--purple); }
.cat-高壓氧 .card-code { background: #dcfce7; color: #16a34a; }
.cat-CPR急救 .card-code { background: var(--red-light); color: var(--red); }
.cat-俯臥通氣 .card-code { background: var(--teal-light); color: var(--teal); }
.cat-呼吸道清潔 .card-code { background: var(--green-light); color: var(--green); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Footer */
.app-footer {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  font-size: 11px;
  color: var(--sub);
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.app-footer a { color: var(--blue); text-decoration: none; }
.app-footer a:hover { text-decoration: underline; }

/* Sort controls */
.sort-controls {
  display: flex; gap: 6px; margin-bottom: 12px; align-items: center;
}
.sort-label { font-size: 12px; color: var(--sub); }
.sort-btn {
  font-size: 12px; padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; color: var(--text); font-family: 'Noto Sans TC', sans-serif;
  transition: all .15s;
}
.sort-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* Highlight */
.highlight { background: #fef08a; border-radius: 2px; }

/* Mobile */
@media (max-width: 640px) {
  :root { --sidebar-w: 160px; }
  .app-header h1 { font-size: 13px; }
  .content { padding: 10px; }
  .card-name-zh { font-size: 13px; }
  .sidebar-item { font-size: 12px; padding: 7px 10px; }
}
@media (max-width: 480px) {
  .sidebar { width: 44px; }
  .sidebar-item .cat-label { display: none; }
  .sidebar-item .cat-count { display: none; }
  .sidebar-section-label { display: none; }
  .sidebar-divider { margin: 4px 6px; }
  .sidebar-item { justify-content: center; padding: 10px 6px; }
}
</style>
</head>

ly controlled），且符合下列任一項者：A.症狀控制不佳：氣喘控制問卷(ACQ)＞1.5，氣喘控制檢驗(ACT)＜20（或根據美國國家氣喘衛教及防治協會NAEPP/GINA指引分類為"not well controlled")。B.經常性嚴重急性發作：過去一年有二次以上之急性發作需要使用全身性類固醇治療三天以上。C.危及生命之急性發作：過去一年至少一次住院、住加護病房或人工呼吸器支持。2.支付規範：(1)申報次數：一年最多申報三次。(2)申報專科別：兒科、內科、家醫科、耳鼻喉科。(3)執行限制：限受過操作訓練之醫療人員。(4)費用申報時必要之附件：檢測報告。","category":"肺功能檢查"},{"code":"17023B","points":"900","start":"20180601","end":"29101231","name_en":"Six-minute Walk Test","name_zh":"六分鐘步行測試","note":"註：1.適應症：(1)原發性肺性高血壓(Primary pulmonary hypertension)。(2)先天性心臟病合併肺高壓。(3)其他申請肺動脈高血壓用藥申請事前審查者。2.適用層級：申請肺高壓用藥之醫院門、住診均可使用。3.支付規範：(1)執行頻率：每年二次。(2)不得同時申報57017C。","category":"肺功能檢查"},{"code":"17024B","points":"3883","start":"20230701","end":"29101231","name_en":"Chest electrical impedance tomography","name_zh":"胸部電阻斷面造影","note":"1.適應症：入住加護病房，且為柏林定義中重度急性呼吸窘迫症候群病人（ICD-10-CM：J80）。2.限內科、外科、麻醉科、兒科、急診醫學科、神經科及神經外科專科醫師執行。3.須醫師及呼吸治療師在場共同操作，隨時提供必要之緊急措施。4.執行本項至少需有十六個以上胸帶電極數，且執行本項時間至少六十分鐘，並應於申報時填寫執行起迄時間。5.需檢附「胸部電阻斷面造影報告」備查。6.每次住院以申報一次為原則，至多申報二次，並應於病歷敘明重複執行之原因。","category":"肺功能檢查"},{"code":"57023B","points":"900","start":"20240401","end":"29101231","name_en":"Non-invasive positive pressure (day)(如Nasal PAP、CPAP、Bi-PAP)。","name_zh":"非侵襲性陽壓呼吸治療一天","note":"1.含氧氣吸入使用費、濕氣吸入治療費及器材使用費用。2.已內含Ambu bag 之使用及抽痰，不得另申報57009B(甦醒器使用/天)及47041C或47042C(呼吸道抽吸)之費用。3.不得同時申報57030B、57031B及57032B。","category":"呼吸治療/呼吸器"},{"code":"57024B","points":"205","start":"19961001","end":"29101231","name_en":"Aerosol therapy for ventilator(day)","name_zh":"人工呼吸器噴霧吸入治療一天","note":"","category":"呼吸治療/呼吸器"},{"code":"57032B","points":"3712","start":"20240401","end":"29101231","name_en":"Neurally adjusted ventilatory assist（NAVA）ventilation and Electrical activity of the diaphragm（Edi）monitoring／day","name_zh":"神經調控通氣輔助呼吸治療及橫膈膜電位訊號監測（一天）","note":"1.適應症：限用於患有支氣管肺發育不全的未滿兩歲嬰幼兒，且符合插管天數十四天以上，無法拔管之病人。2.支付規範：(1)限醫院緊急醫療能力分級評定基準評定結果，屬高危險妊娠及新生兒醫療中度級以上急救責任醫院申報。(2)限新生兒科、兒童胸腔暨重症科、兒童重症醫學科、兒童神經科專科醫師申報。(3)申報費用時應檢附下列呼吸治療項目之紀錄：呼吸器使用模式、Edi min、Edi peak、FiO2、PEEP，視需要加填NAVA level。(4)限住院案件申報。(5)不得同時申報57001B、57023B、57029C、57030B及57031B。","category":"呼吸治療/呼吸器"},{"code":"57030B","points":"6000","start":"20240401","end":"29101231","name_en":"Humidified high flow oxygen therapy - First time","name_zh":"濕化高流量氧氣治療 － 第一天照護費（含管路特材）","note":"1.限急診或住院病人符合下列適應症者使用：(1)成人(十九歲以上)A.急性缺氧性呼吸衰竭，且需同時符合下列各項條件：(a)當以10L/min或更高的流速供應氧氣至少十五分鐘，P/F ratio≦300時。(b)RR>25次/min，呼吸困難或呼吸窘迫。(c)PaCO₂≦45 mmHg。B.呼吸衰竭拔管後，預防再次插管使用，並有下列任一情形：(a)曾插管二十四小時以上之病人，且有下列任一高危險因子者：年紀六十五歲以上、APACHE II＞12分、BMI>30 Kg/㎡、呼吸道清除功能失效、困難脫離呼吸器病人或插管大於七天病人。(b)經臨床負責醫師判定有再度發生呼吸衰竭之可能。(2)兒童(未滿十九歲)A.缺氧性呼吸衰竭或呼吸窘迫。B.脫離侵襲性或非侵襲性呼吸器後，預防再次使用呼吸器時使用。2.限內科、外科、麻醉科、兒科、急診醫學科、神經科及神經外科專科醫師執行。3.不得同時申報57004C、57023B及57032B。4.更換管路當日比照第一天照護費申報。5.兒童(未滿十九歲)得依表定點數加計百分之二十。6.57030B內含一般材料費、高流量鼻導管及高流量管路組費比率為百分之六十五。","category":"HFNC 高流量"},{"code":"57031B","points":"1937","start":"20240401","end":"29101231","name_en":"Humidified high flow oxygen therapy - Daily care","name_zh":"濕化高流量氧氣治療 － 第二天後照護費（天）","note":"1.適應症同57030B。2.限內科、外科、麻醉科、兒科、急診醫學科、神經科及神經外科專科醫師執行。3.不得同時申報57004C、57023B及57032B。4.更換管路當日比照第一天照護費申報。5.兒童(未滿十九歲)得依表定點數加計百分之二十。","category":"HFNC 高流量"},{"code":"02011K","points":"1925","start":"20260401","end":"29101231","name_en":"","name_zh":"加護病床住院診察費(天)","note":"1.精神科加護病床、燒傷中心及骨髓移植隔離病床比照申報。2.兒科專科醫師得加計百分之一百二十，若同時符合兒童加成或兒科及新生兒科加護病房加成者，依加成率合計後一併加成，最高加成上限為百分之一百六十。","category":"重症/ICU"},{"code":"02012A","points":"1729","start":"20260401","end":"29101231","name_en":"","name_zh":"加護病床住院診察費(天)","note":"1.精神科加護病床、燒傷中心及骨髓移植隔離病床比照申報。2.兒科專科醫師得加計百分之一百二十。","category":"重症/ICU"},{"code":"02013B","points":"1536","start":"20260401","end":"29101231","name_en":"","name_zh":"加護病床住院診察費(天)","note":"1.精神科加護病床、燒傷中心及骨髓移植隔離病床比照申報。2.兒科專科醫師得加計百分之一百二十。","category":"重症/ICU"},{"code":"03010E","points":"2852","start":"20240701","end":"29101231","name_en":"ICU","name_zh":"加護病床（床/天）-病房費","note":"1.監視器、C.V.P.處理費等已包括在所訂點數內，不得另計。2.呼吸器、電擊、氧氣、C.V.P.置入及顱內壓監視置入等另按實際使用申報。3.適用對象：急性呼吸衰竭、呼吸窘迫、心肺衰竭、休克、敗血症、重大術後等危篤重症危及生命者。4.轉出條件：血動力學穩定、脫離呼吸器、不需加護醫療照護者。","category":"重症/ICU"},{"code":"03011F","points":"2406","start":"20240 // State
let currentCat = 'all';
let searchQuery = '';
let sortMode = 'default';

// Format date
function fmtDate(d) {
  if (!d || d.startsWith('2910')) return '現行有效';
  return d.slice(0,4) + '/' + d.slice(4,6) + '/' + d.slice(6,8);
}

// CSS class for category
function catClass(cat) {
  return cat.replace(/[\/\s]/g, '');
}

// Build sidebar
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  CATS.forEach(cat => {
    const count = cat.id === 'all'
      ? RAW_DATA.length
      : RAW_DATA.filter(d => d.category === cat.id).length;
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (cat.id === currentCat ? ' active' : '');
    div.dataset.cat = cat.id;
    div.innerHTML = `<span class="cat-icon">${cat.icon}</span><span class="cat-label">${cat.label}</span><span class="cat-count">${count}</span>`;
    div.addEventListener('click', () => { currentCat = cat.id; searchQuery = ''; document.getElementById('searchInput').value = ''; render(); });
    sidebar.appendChild(div);
    if (cat.id === 'all') {
      const div2 = document.createElement('div'); div2.className = 'sidebar-divider'; sidebar.appendChild(div2);
      const lbl = document.createElement('div'); lbl.className = 'sidebar-section-label'; lbl.textContent = '分類'; sidebar.appendChild(lbl);
    }
  });
}

// Highlight search term
function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<span class="highlight">${m}</span>`);
}

// Filter & sort data
function getFilteredData() {
  let data = currentCat === 'all' ? RAW_DATA : RAW_DATA.filter(d => d.category === currentCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = RAW_DATA.filter(d =>
      d.code.toLowerCase().includes(q) ||
      d.name_zh.toLowerCase().includes(q) ||
      d.name_en.toLowerCase().includes(q) ||
      d.note.toLowerCase().includes(q)
    );
  }
  if (sortMode === 'high') data = [...data].sort((a,b) => parseInt(b.points) - parseInt(a.points));
  else if (sortMode === 'low') data = [...data].sort((a,b) => parseInt(a.points) - parseInt(b.points));
  return data;
}

// Render cards
function render() {
  buildSidebar();
  const data = getFilteredData();
  const q = searchQuery;

  // Title
  const catObj = CATS.find(c => c.id === currentCat) || CATS[0];
  const title = document.getElementById('contentTitle');
  title.innerHTML = `${catObj.icon} ${searchQuery ? '搜尋結果' : catObj.label} <span class="cat-badge">${data.length} 項</span>`;

  // Cards
  const grid = document.getElementById('cardsGrid');
  const searchCount = document.getElementById('searchCount');
  searchCount.textContent = q ? `找到 ${data.length} 筆` : '';

  if (data.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>沒有符合「${q}」的項目</p></div>`;
    return;
  }

  grid.innerHTML = '';
  data.forEach(item => {
    const card = document.createElement('div');
    const cc = catClass(item.category);
    card.className = `card cat-${cc}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-code">${highlight(item.code, q)}</span>
        <div class="card-main">
          <div class="card-name-zh">${highlight(item.name_zh, q)}</div>
          ${item.name_en ? `<div class="card-name-en">${highlight(item.name_en, q)}</div>` : ''}
          <div class="card-meta">
            <span class="points-badge">${parseInt(item.points).toLocaleString()} 點</span>
            <span class="date-badge">生效 ${fmtDate(item.start)}</span>
            ${item.note ? `<span class="expand-icon">▼</span>` : ''}
          </div>
        </div>
        <button class="copy-btn" data-code="${item.code}">複製代碼</button>
      </div>
      ${item.note ? `<div class="card-note">${highlight(item.note, q) || '<span class="no-note">—</span>'}</div>` : ''}
    `;

    // Toggle note
    card.querySelector('.card-header').addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-btn')) return;
      if (item.note) card.classList.toggle('expanded');
    });

    // Copy button
    const copyBtn = card.querySelector('.copy-btn');
    if (copyBtn) {
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(item.code).catch(() => {});
        copyBtn.textContent = '✓ 已複製';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = '複製代碼'; copyBtn.classList.remove('copied'); }, 1500);
      });
    }
    grid.appendChild(card);
  });
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  if (searchQuery) currentCat = 'all';
  render();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  searchQuery = ''; document.getElementById('searchInput').value = ''; render();
});

// Sort
document.getElementById('sortDefault').addEventListener('click', () => { sortMode = 'default'; updateSort(); render(); });
document.getElementById('sortHigh').addEventListener('click', () => { sortMode = 'high'; updateSort(); render(); });
document.getElementById('sortLow').addEventListener('click', () => { sortMode = 'low'; updateSort(); render(); });
function updateSort() {
  ['sortDefault','sortHigh','sortLow'].forEach(id => document.getElementById(id).classList.remove('active'));
  const map = { default: 'sortDefault', high: 'sortHigh', low: 'sortLow' };
  document.getElementById(map[sortMode]).classList.add('active');
}

// Init
render();
</script>
</body>
